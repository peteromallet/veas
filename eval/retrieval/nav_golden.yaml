# Navigation golden set for retrieval eval harness.
# Generated manually — DO NOT hand-edit corpus refs without re-validating.
# Covers all seven nav ops with >=1 case per op, 2+ for most-used.

cases:
# =========================================================================
# open_thread — returns all messages in a thread in chronological order.
# n is ignored for this op.
# =========================================================================
- id: NAV01
  op: open_thread
  scope: thread
  thread_id: thread_nexus_kickoff
  topic_id: topic_project_nexus
  expected_ids_in_order:
    - m001
    - nav_thread_nexus_kickoff_start
    - m002
    - m003
    - m004
    - m005
    - nav_thread_nexus_kickoff_mid
    - m006
    - m007
    - m008
    - m009
    - m010
    - m011
    - m012
    - m013
    - m014
    - m015
    - m016
    - m017
    - nav_thread_nexus_kickoff_end
    - m018
  notes: 'Full thread in chronological order (21 msgs). n ignored.'

