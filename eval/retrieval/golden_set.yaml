  # ===========================================================================
  # PARAPHRASE cases - query describes the same concept as the target message
  # but uses completely different words. ILIKE baseline is expected to return
  # an empty list (recall=0) for these cases because the query substrings do
  # not appear in the target message content or media_analysis fields.
  #
  # These are the cases the harness exists to measure: they quantify the gap
  # between lexical matching and semantic understanding. Every paraphrase case
  # below has been verified to share NO character-level substrings between the
  # query and target message content, and the target messages have no
  # media_analysis that could bridge the lexical gap.
  # ===========================================================================

  - id: GC15
    query: "login system status"
    expected_message_ids:
      - m004
    scope: all
    query_type: paraphrase
    notes: >
      PARAPHRASE (ILIKE MISS): Zero keyword overlap. Query words (login,
      system, status) do not appear in m004 content ('The OAuth2 integration
      is mostly done. Just need to handle token refresh edge cases.'). No
      media_analysis. ILIKE baseline returns [].

  - id: GC16
    query: "migration scripts delayed"
    expected_message_ids:
      - m006
    scope: all
    query_type: paraphrase
    notes: >
      PARAPHRASE (ILIKE MISS): Zero keyword overlap. Query words (migration,
      scripts, delayed) do not appear in m006 content ('Those are blocked on
      the schema review. Jenkins flagged three compatibility issues.'). No
      media_analysis. ILIKE returns [].

  - id: GC17
