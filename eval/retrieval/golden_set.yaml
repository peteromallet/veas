  # ===========================================================================
  # CROSS_THREAD cases - topic-scoped query where the correct answer spans
  # messages from multiple threads sharing the same topic_id. The ILIKE
  # baseline will find messages across threads via substring match, but the
  # scope filter is the key differentiator: a thread-scoped query would miss
  # relevant messages in the other thread, while a topic-scoped query must
  # return from both.
  # ===========================================================================

  - id: GC25
    query: "What are the weekend plans for food?"
    expected_message_ids:
      - m025
      - m037
      - m038
      - m039
      - m042
      - m044
      - m051
      - m056
    scope: topic
    query_type: cross_thread
    topic_id: topic_weekend_plans
    notes: >
      CROSS_THREAD: Query targets topic_weekend_plans which spans
      thread_weekend_hike (hike food logistics: m025) and thread_weekend_dinner
      (dinner plans: m037-m056). Topic-scoped retrieval must return messages
      from BOTH threads. m051 is media_analysis-only (Luigi's menu PDF).

