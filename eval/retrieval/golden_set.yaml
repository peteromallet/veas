# =============================================================================
# Golden Set for Retrieval Evaluation Harness
# =============================================================================
#
# Methodology:
#
# This golden set defines 28 hand-crafted retrieval test cases spanning all
# four query_type values (topic_recall, verbatim_quote, paraphrase, cross_thread).
# Every expected_message_ids list references real message ids from corpus.yaml
# and is non-empty (enforced by the loader per SD6 / correctness-4).
#
# SCOPE CONSISTENCY:
# - scope='thread' cases supply thread_id (required by loader per correctness-3).
# - scope='topic' cases supply topic_id (required by loader per correctness-3).
# - scope='all' cases supply neither (omitted from YAML, defaulting to null).
#
# WHY PARAPHRASE/CROSS_THREAD CASES LOOK LIKE BASELINE FAILURES:
#
# The ILIKE baseline retriever does case-insensitive substring matching against
# message content and media_analysis fields. Paraphrase cases in this golden set
# use queries whose individual words share NO character-level substrings with the
# target message content (and the target messages have no media_analysis that
# could bridge the gap). Since ILIKE is purely lexical, it will return an empty
# list (recall=0) for these cases. This is the harness's reason to exist: the
# ILIKE baseline establishes the floor, and a semantic retriever (or future
# embedding-based system) must beat that floor by recovering the paraphrase cases
# that the baseline cannot touch.
#
# Cross-thread cases stress the scope model: a topic-scoped query must surface
# messages from ALL threads that share that topic_id. The ILIKE baseline will
# find messages containing the query substring regardless of thread, but the
# scope filter constrains which subset is returned, making scope correctness
# testable independently of lexical recall. A topic-scoped query about weekend
# plans must return messages from both thread_weekend_hike and thread_weekend_dinner.
#
# CASE DISTRIBUTION:
#   topic_recall:   6 cases (GC01-GC06)
#   verbatim_quote: 8 cases (GC07-GC14)
#   paraphrase:    10 cases (GC15-GC24) - all with zero keyword overlap
#   cross_thread:   4 cases (GC25-GC28)
#   TOTAL:         28 cases
# =============================================================================

cases:
  # ===========================================================================
  # TOPIC_RECALL cases - query describes a topic/sub-topic; retriever must
  # find messages semantically relevant to that topic.
  # ===========================================================================

