    topic_id: topic_project_nexus
    notes: >
      Topic-scoped recall for auth module discussions. m003 asks about auth
      module, m004 describes OAuth2 token refresh edge cases, m047 shows null
      pointer exception in AuthService.java (media_analysis-only signal).

