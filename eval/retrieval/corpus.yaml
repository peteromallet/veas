# =============================================================================
# Synthetic Retrieval Evaluation Corpus
# =============================================================================
#
# Hard-case design methodology:
#
# 1. TERSE REPLIES (one-word or very short replies):
#    Messages like "fine.", "sure", "I told you so." test whether retrievers
#    can surface low-signal messages that carry conversational state. ILIKE
#    will match these if the query contains the exact word, but a retrieval
#    system that dismisses short messages will fail.
#
# 2. PARAPHRASE PAIRS:
#    Target messages use wording that deliberately DIVERGES from what a
#    natural query would phrase. For example, "the idempotency key check is
#    failing under concurrent requests" vs a query like "transaction duplicate
#    bug". These are the cases ILIKE MUST miss because the substring does not
#    overlap. A semantic retriever should catch them.
#
# 3. CROSS-THREAD CONTINUATIONS:
#    The same topic_id (e.g., topic_weekend_plans) is referenced in two
#    different thread_ids (thread_weekend_hike and thread_weekend_dinner).
#    A topic-scoped query should return messages from ALL threads sharing
#    that topic. A thread-scoped query should isolate to one thread.
#
# 4. NEAR-DUPLICATE INCIDENTS:
#    Two messages describe the same event (e.g., a payment processor bug)
#    with wording that differs by one detail. These exercise deduplication
#    and ranking stability — both should surface for the same query, and
#    their relative order should be deterministic.
#
# 5. MEDIA-ANALYSIS-ONLY SIGNAL:
#    Several messages have generic content ("Check this out", "See attached",
#    "Here's the thing I mentioned") where ALL the semantically relevant
#    information lives in media_analysis.explanation, media_analysis.description,
#    or media_analysis.summary. ILIKE baseline matches these fields, but
#    only if the query substring appears there.
#
# DESIGN NOTES:
# - ALL sent_at values are strictly unique across the entire corpus.
#   This guarantees deterministic ordering under (sent_at DESC, id DESC)
#   per SD3 / callers-3. No two messages share a timestamp.
# - Message ids use stable ASCII m001..m060 format.
# - Two topics: topic_project_nexus (work), topic_weekend_plans (personal).
# - Four threads: thread_nexus_kickoff, thread_nexus_bugs (project_nexus);
#   thread_weekend_hike, thread_weekend_dinner (weekend_plans).
# - Single dyad: Alice <-> Bob.
# =============================================================================

